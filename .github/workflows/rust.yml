name: Rust Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10"]

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Install Protoc
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install UV
      run: make install-uv
    - name: Install Python tools
      run: make install-python-tools
    - name: Build
      run: make build
    - name: Tests
      run: make test
    - name: Compare actual vs approx memory per page
      run: make test-compare-actual-vs-approx-memory-per-page
    - name: Profile page weigher
      run: make bench-page-approx-deserialized-bytes
