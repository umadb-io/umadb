syntax = "proto3";

package umadb;

// Event message
message Event {
  string event_type = 1;
  repeated string tags = 2;
  bytes data = 3;
  string uuid = 4;
}

// Sequenced Event message
message SequencedEvent {
  uint64 position = 1;
  Event event = 2;
}

// Query Item message
message QueryItem {
  repeated string types = 1;
  repeated string tags = 2;
}

// Query message
message Query {
  repeated QueryItem items = 1;
}

// Append Condition message
message AppendCondition {
  optional Query fail_if_events_match = 1;
  optional uint64 after = 2;
}

// Read request message
message ReadRequest {
  optional Query query = 1;
  optional uint64 start = 2;
  optional bool backwards = 3;
  optional uint32 limit = 4;
  optional bool subscribe = 5;
  optional uint32 batch_size = 6;
}

// Read response message
message ReadResponse {
  repeated SequencedEvent events = 1;
  optional uint64 head = 2;
}

// Append request message
message AppendRequest {
  repeated Event events = 1;
  optional AppendCondition condition = 2;
}

// Append response message
message AppendResponse {
  uint64 position = 1;
}

// Head request message
message HeadRequest {
  // Empty request, no parameters needed
}

// Head response message
message HeadResponse {
  optional uint64 position = 1;
}

// Error response
message ErrorResponse {
  string message = 1;
  ErrorType error_type = 2;

  enum ErrorType {
    IO = 0;
    SERIALIZATION = 1;
    INTEGRITY = 2;
    CORRUPTION = 3;
    INTERNAL = 4;
  }
}

// UmaDB service
service UmaDBService {
  // Read events from the store
  rpc Read(ReadRequest) returns (stream ReadResponse);

  // Append events to the store
  rpc Append(AppendRequest) returns (AppendResponse);

  // Get the current head position of the event store
  rpc Head(HeadRequest) returns (HeadResponse);
}
